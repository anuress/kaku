name: publish-android

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew :kaku-core:build :kaku-network:build
        working-directory: android

      - name: Upload kaku-core AAR
        uses: actions/upload-artifact@v4
        with:
          name: kaku-core-${{ github.ref_name }}
          path: android/kaku-core/build/outputs/aar/kaku-core-release.aar
