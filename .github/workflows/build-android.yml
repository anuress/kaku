name: kaku-core

on:
  push:
    branches: ["**"]
    paths:
      - "android/**"
  pull_request:
    paths:
      - "android/**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew :kaku-core:build :kaku-network:build
        working-directory: android
